<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>JOE TV V22.06 | 极速聚合终极版</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    <style>
        :root { --main: #6c5ce7; --bg: #0f0f12; --card-bg: #1e1e24; --text: #f1f2f6; --accent: #00d2d3; --error: #ff7675; --success: #55efc4; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
        
        header { position: sticky; top: 0; background: rgba(15, 15, 18, 0.85); backdrop-filter: blur(15px); display: flex; align-items: center; padding: 12px 25px; z-index: 1000; border-bottom: 1px solid #333; }
        .logo { font-size: 22px; font-weight: 900; color: var(--main); margin-right: 30px; cursor: pointer; }
        .nav { display: flex; gap: 10px; flex: 1; overflow-x: auto; scrollbar-width: none; }
        .nav div { padding: 8px 18px; border-radius: 12px; cursor: pointer; font-size: 14px; background: #2d2d35; white-space: nowrap; transition: 0.3s; }
        .nav .active { background: var(--main); color: #fff; }
        .search-box input { padding: 10px 20px; border-radius: 25px; border: 1px solid #444; background: #2d2d35; color: #fff; outline: none; width: 250px; }

        .container { max-width: 1600px; margin: 20px auto; padding: 0 20px; }
        .section-h { font-size: 20px; font-weight: bold; margin: 30px 0 15px; border-left: 5px solid var(--main); padding-left: 15px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; border: 1px solid #333; }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #222; }
        .card .info { padding: 10px; text-align: center; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .source-tag { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: var(--accent); font-size: 10px; padding: 2px 6px; border-radius: 4px; z-index: 2; }

        /* 播放器页面 */
        #player-page { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; }
        .p-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; max-width: 1600px; margin: 0 auto; }
        .v-box { background: #000; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; }
        .ep-list { background: var(--card-bg); padding: 15px; border-radius: 15px; max-height: 600px; overflow-y: auto; }
        .ep-item { padding: 10px; background: #2d2d35; margin-bottom: 8px; border-radius: 8px; cursor: pointer; font-size: 13px; text-align: center; }
        .ep-item:hover { background: var(--main); }
        .ep-item.active { background: var(--main); font-weight: bold; }

        /* 模态框 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-body { background: #1e1e24; width: 90%; max-width: 600px; padding: 25px; border-radius: 20px; }
        textarea { width: 100%; height: 150px; background: #000; color: var(--success); border: 1px solid #444; padding: 10px; box-sizing: border-box; font-family: monospace; border-radius: 10px; margin: 10px 0; }
        .mgr-btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .status-text { font-size: 12px; color: var(--accent); margin-bottom: 10px; min-height: 18px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">JOE TV <span style="font-size:12px;opacity:0.5;">V22.06</span></div>
    <div class="nav">
        <div class="active" onclick="route('home', this)">🏠 首页</div>
        <div onclick="route('1', this)">🎬 电影</div>
        <div onclick="route('2', this)">📺 剧集</div>
        <div onclick="route('3', this)">🎭 综艺</div>
        <div onclick="route('4', this)">🧧 动漫</div>
        <div style="color:var(--error)" onclick="toggleModal(true)">⚙️ 配置</div>
    </div>
    <div class="search-box">
        <input type="text" id="kw" placeholder="搜索资源..." onkeydown="if(event.keyCode==13) handleSearch()">
    </div>
</header>

<div class="container">
    <div id="main-view"></div>
</div>

<div id="player-page">
    <div style="padding:15px 25px; color:var(--main); cursor:pointer; font-weight:bold;" onclick="closePlayer()">🔙 返回首页</div>
    <div class="p-layout">
        <div>
            <div class="v-box" id="video-container"></div>
            <h2 id="v-title" style="margin-top:20px;"></h2>
            <p id="v-desc" style="font-size:14px; color:#aaa; line-height:1.6;"></p>
        </div>
        <div class="ep-list" id="ep-list">
            <div style="margin-bottom:15px; font-weight:bold; color:var(--accent);">播放列表</div>
            <div id="ep-items"></div>
        </div>
    </div>
</div>

<div id="mgr-modal" class="modal">
    <div class="modal-body">
        <h3 style="margin:0 0 10px 0;">接口管理</h3>
        <div id="status-bar" class="status-text"></div>
        <div id="api-list-ui" style="max-height:150px; overflow-y:auto; background:#16161c; border-radius:8px; margin-bottom:10px;"></div>
        <textarea id="api-input" placeholder="请在此输入线路地址，每行一个..."></textarea>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="mgr-btn" style="background:var(--main); color:#fff;" onclick="batchAdd()">测速并同步</button>
            <button class="mgr-btn" style="background:#444; color:#fff;" onclick="toggleModal(false)">关闭</button>
        </div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    let apiList = JSON.parse(localStorage.getItem('joe_v22_apis') || '[]');
    let player = null;

    // 通用抓取
    async function smartFetch(url, params) {
        try {
            const controller = new AbortController();
            setTimeout(() => controller.abort(), 8000);
            const res = await fetch(`${url}${url.includes('?') ? '&' : '?'}${params}`, { signal: controller.signal });
            return await res.json();
        } catch (e) { return null; }
    }

    // 测速与导入
    async function batchAdd() {
        const input = document.getElementById('api-input').value.trim();
        const urls = input ? input.split('\n').filter(u => u.startsWith('http')) : apiList.map(a => a.url);
        if(!urls.length) return alert("请输入有效链接");

        document.getElementById('status-bar').innerText = "⚡ 正在测速排序，请稍后...";
        let newList = [];

        for(let url of urls) {
            const start = Date.now();
            const data = await smartFetch(url, 'ac=list');
            if(data) {
                newList.push({ name: data.source?.name || url.split('/')[2], url: url, delay: Date.now() - start });
            } else {
                // 如果测速失败但原本就在列表里，保留它以防万一
                const old = apiList.find(a => a.url === url);
                if(old) newList.push(old);
            }
            renderApiUI(newList);
        }

        apiList = newList.sort((a,b) => (a.delay || 999) - (b.delay || 999));
        localStorage.setItem('joe_v22_apis', JSON.stringify(apiList));
        document.getElementById('status-bar').innerText = "✅ 同步完成！";
        setTimeout(() => { toggleModal(false); route('home'); }, 1000);
    }

    function renderApiUI(list) {
        const container = document.getElementById('api-list-ui');
        container.innerHTML = list.map((a, i) => `
            <div style="padding:8px 12px; display:flex; justify-content:space-between; font-size:12px; border-bottom:1px solid #222;">
                <span>${a.name}</span>
                <span style="color:${a.delay < 500 ? 'var(--success)' : 'var(--error)'}">${a.delay || '超时'}ms</span>
            </div>
        `).join('');
    }

    // 搜索
    async function handleSearch() {
        const kw = document.getElementById('kw').value.trim();
        if(!kw || !apiList.length) return;
        const view = document.getElementById('main-view');
        view.innerHTML = `<div class="section-h">🔍 正在深度搜索：${kw}</div><div class="grid" id="main-grid"></div>`;
        
        for(let api of apiList) {
            const data = await smartFetch(api.url, `ac=detail&wd=${encodeURIComponent(kw)}`);
            if(data && data.list) {
                renderCards(data.list, api.url, api.name);
            }
        }
    }

    // 加载首页/分类
    async function route(type, el) {
        if(el) {
            document.querySelectorAll('.nav div').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
        const view = document.getElementById('main-view');
        if(!apiList.length) {
            view.innerHTML = `<div style="text-align:center; padding:100px; opacity:0.5;">请先点击 [配置] 导入线路</div>`;
            return;
        }
        view.innerHTML = `<div class="section-h">${type==='home'?'🔥 热门推荐':'🎬 分类筛选'}</div><div class="grid" id="main-grid"></div>`;
        
        // 聚合前两个最快的源
        for(let i=0; i<Math.min(2, apiList.length); i++) {
            const data = await smartFetch(apiList[i].url, `ac=detail&t=${type==='home'?'':type}`);
            if(data && data.list) renderCards(data.list.slice(0, 12), apiList[i].url, apiList[i].name);
        }
    }

    function renderCards(list, apiUrl, sourceName) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML += list.map(v => `
            <div class="card" onclick="loadDetail('${apiUrl}', '${v.vod_id}')">
                <div class="source-tag">${sourceName}</div>
                <img src="${v.vod_pic}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Pic'">
                <div class="info">${v.vod_name}</div>
            </div>
        `).join('');
    }

    // 详情与播放
    async function loadDetail(url, id) {
        const data = await smartFetch(url, `ac=detail&ids=${id}`);
        if(!data || !data.list.length) return alert("获取详情失败");
        const vod = data.list[0];

        document.getElementById('player-page').style.display = 'block';
        document.getElementById('v-title').innerText = vod.vod_name;
        document.getElementById('v-desc').innerText = vod.vod_content.replace(/<[^>]+>/g, '');

        // 解析剧集
        const playUrls = vod.vod_play_url.split('$$$')[0].split('#');
        const items = playUrls.map(line => {
            const [name, link] = line.split('$');
            return { name, link };
        });

        document.getElementById('ep-items').innerHTML = items.map((item, idx) => `
            <div class="ep-item" onclick="startPlay('${item.link}', this)">${item.name}</div>
        `).join('');
        
        // 自动播放第一集
        if(items.length > 0) startPlay(items[0].link, document.querySelector('.ep-item'));
    }

    function startPlay(url, el) {
        document.querySelectorAll('.ep-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        
        const container = document.getElementById('video-container');
        container.innerHTML = `<video id="v-core" class="video-js vjs-theme-city vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>`;
        
        if(player) player.dispose();
        player = videojs('v-core', { autoplay: true });
        player.src({ src: url, type: 'application/x-mpegURL' });
    }

    function closePlayer() {
        if(player) player.dispose();
        document.getElementById('player-page').style.display = 'none';
    }

    function toggleModal(s) {
        document.getElementById('mgr-modal').style.display = s ? 'flex' : 'none';
        if(s) renderApiUI(apiList);
    }

    window.onload = () => route('home');
</script>
</body>
</html>
