<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>JOE TV V22.06 | 极速聚合高级版</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    <style>
        :root { --main: #6c5ce7; --bg: #0f0f12; --card-bg: #1e1e24; --text: #f1f2f6; --accent: #00d2d3; --error: #ff7675; --success: #55efc4; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
        header { position: sticky; top: 0; background: rgba(15, 15, 18, 0.85); backdrop-filter: blur(15px); display: flex; align-items: center; padding: 12px 25px; z-index: 1000; border-bottom: 1px solid #333; }
        .logo { font-size: 22px; font-weight: 900; color: var(--main); margin-right: 30px; cursor: pointer; letter-spacing: -1px; }
        .nav { display: flex; gap: 10px; flex: 1; overflow-x: auto; scrollbar-width: none; }
        .nav div { padding: 8px 18px; border-radius: 12px; cursor: pointer; font-size: 14px; background: #2d2d35; white-space: nowrap; transition: 0.3s; }
        .nav .active { background: var(--main); color: #fff; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); }
        .search-box input { padding: 10px 20px; border-radius: 25px; border: 1px solid #444; background: #2d2d35; color: #fff; outline: none; width: 250px; transition: 0.3s; }
        .search-box input:focus { width: 350px; border-color: var(--main); }
        .container { max-width: 1600px; margin: 20px auto; padding: 0 20px; }
        .section-h { font-size: 20px; font-weight: bold; margin: 30px 0 15px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid var(--main); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; border: 1px solid #333; }
        .card:hover { transform: translateY(-10px); border-color: var(--main); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #222; }
        .card .info { padding: 12px; text-align: center; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .source-tag { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); color: var(--accent); font-size: 11px; padding: 3px 8px; border-radius: 6px; z-index: 2; border: 1px solid rgba(255,255,255,0.1); }
        #player-page { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; }
        .p-layout { display: grid; grid-template-columns: 1fr 400px; gap: 25px; padding: 25px; max-width: 1800px; margin: 0 auto; }
        .v-box { background: #000; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; position: relative; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(10px); }
        .modal-body { background: #1e1e24; width: 600px; padding: 30px; border-radius: 25px; border: 1px solid #444; }
        textarea { width: 100%; height: 120px; margin: 15px 0; border-radius: 12px; padding: 15px; box-sizing: border-box; background: #0f0f12; color: #fff; border: 1px solid #444; font-family: monospace; resize: none; }
        .mgr-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mgr-btn { padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .status-msg { font-size: 12px; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; }
        .delay-tag { padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 8px; }
        .delay-fast { background: var(--success); color: #000; }
        .delay-slow { background: var(--error); color: #fff; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">JOE TV <span style="font-size:12px;vertical-align:top;opacity:0.6;">V22.06</span></div>
    <div class="nav" id="main-nav">
        <div class="active" onclick="route('home', this)">🏠 首页推荐</div>
        <div onclick="route('1', this)">🎬 电影</div>
        <div onclick="route('2', this)">📺 剧集</div>
        <div onclick="route('3', this)">🎭 综艺</div>
        <div onclick="route('4', this)">🧧 动漫</div>
        <div style="background:rgba(255,118,117,0.2);color:#ff7675" onclick="toggleModal(true)">⚙️ 系统配置</div>
    </div>
    <div class="search-box">
        <input type="text" id="kw" placeholder="输入关键词，全网深度搜索..." onkeydown="if(event.keyCode==13) handleQuickIn()">
    </div>
</header>

<div class="container">
    <div id="main-view"></div>
</div>

<div id="mgr-modal" class="modal">
    <div class="modal-body">
        <h3 style="margin-top:0">配置管理与接口测速</h3>
        <div id="status-bar" class="status-msg"></div>
        <div id="api-mgr-list" style="max-height:200px; overflow-y:auto; background:#0f0f12; border-radius:10px; margin-bottom:15px; border:1px solid #333;">
            <div style="padding:20px; text-align:center; opacity:0.5;">暂无线路，请在下方导入</div>
        </div>
        <textarea id="api-input" placeholder="请在此粘贴线路URL（每行一个）..."></textarea>
        <div class="mgr-btns">
            <button id="btn-sync" class="mgr-btn" style="background:var(--main); color:#fff" onclick="batchAdd()">测速并同步</button>
            <button class="mgr-btn" style="background:#555; color:#fff" onclick="toggleModal(false)">返回</button>
        </div>
        <p style="font-size: 11px; color: #666; margin-top: 15px;">注：若测速全部失败，请检查是否开启了浏览器跨域插件或网络环境是否畅通。</p>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    let apiList = JSON.parse(localStorage.getItem('joe_v22_apis') || '[]');
    let currentT = '';

    // 显示状态反馈
    function showStatus(msg, type='info') {
        const bar = document.getElementById('status-bar');
        bar.style.display = 'block';
        bar.style.background = type === 'error' ? 'rgba(255,118,117,0.2)' : 'rgba(85,239,196,0.2)';
        bar.style.color = type === 'error' ? var(--error) : var(--success);
        bar.innerText = msg;
    }

    // 核心抓取函数
    async function smartFetch(baseUrl, params = '') {
        const start = Date.now();
        const connector = baseUrl.includes('?') ? '&' : '?';
        const finalUrl = baseUrl.trim() + connector + params;

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000); // 8秒超时

            const res = await fetch(finalUrl, { signal: controller.signal });
            const data = await res.json();
            const delay = Date.now() - start;
            
            return { 
                name: data.source?.name || baseUrl.split('/')[2], 
                list: data.list || [], 
                delay 
            };
        } catch(e) {
            console.error("Fetch Error:", e);
            return null;
        }
    }

    // 渲染管理列表
    function renderMgr() {
        const container = document.getElementById('api-mgr-list');
        if(apiList.length === 0) {
            container.innerHTML = `<div style="padding:20px; text-align:center; opacity:0.5;">暂无线路</div>`;
            return;
        }
        container.innerHTML = apiList.map((a, i) => `
            <div style="padding:12px; display:flex; justify-content:space-between; border-bottom:1px solid #222; align-items:center;">
                <div style="flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis;">
                    <span style="font-size:14px;">${a.name}</span>
                    <span class="delay-tag ${a.delay < 500 ? 'delay-fast' : 'delay-slow'}">${a.delay}ms</span>
                </div>
                <span style="color:var(--error); cursor:pointer; font-size:12px; padding:5px;" onclick="removeApi(${i})">移除</span>
            </div>`).join('');
    }

    function removeApi(i) {
        apiList.splice(i, 1);
        localStorage.setItem('joe_v22_apis', JSON.stringify(apiList));
        renderMgr();
    }

    // 批量导入并测速
    async function batchAdd() {
        const input = document.getElementById('api-input');
        const btn = document.getElementById('btn-sync');
        const raw = input.value.trim();
        
        if(!raw && apiList.length === 0) return alert("请输入接口地址");
        
        const lines = raw ? raw.split(/[\n\s,]+/).filter(l => l.startsWith('http')) : apiList.map(a => a.url);
        if(lines.length === 0 && raw) return alert("未识别到有效的 http 链接");

        btn.disabled = true;
        btn.innerText = "正在测速中...";
        let successCount = 0;
        let newList = [];

        for(let url of lines) {
            showStatus(`正在测试: ${url.substring(0,30)}...`);
            const res = await smartFetch(url, 'ac=list');
            if(res) {
                newList.push({ name: res.name, url: url, delay: res.delay });
                successCount++;
            }
        }

        if(successCount > 0) {
            // 按延迟排序
            newList.sort((a,b) => a.delay - b.delay);
            apiList = newList;
            localStorage.setItem('joe_v22_apis', JSON.stringify(apiList));
            input.value = "";
            showStatus(`成功同步 ${successCount} 条优质线路！`, 'success');
            renderMgr();
            setTimeout(() => { toggleModal(false); route('home'); }, 1500);
        } else {
            showStatus("测速全部失败！请检查接口是否有效或是否存在跨域限制。", "error");
        }
        
        btn.disabled = false;
        btn.innerText = "测速并同步";
    }

    // 全局搜索
    async function handleQuickIn() {
        const kw = document.getElementById('kw').value.trim();
        if(!kw) return;
        if(apiList.length === 0) { toggleModal(true); return; }

        const view = document.getElementById('main-view');
        view.innerHTML = `<div class="section-h">🔍 深度搜索: ${kw}</div><div class="grid" id="search-grid"></div>`;
        
        let hasResult = false;
        for(let api of apiList) {
            const data = await smartFetch(api.url, `ac=detail&wd=${encodeURIComponent(kw)}`);
            if(data && data.list.length > 0) {
                hasResult = true;
                const html = data.list.map(v => `
                    <div class="card">
                        <div class="source-tag">${api.name}</div>
                        <img src="${v.vod_pic}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Pic'">
                        <div class="info">${v.vod_name}</div>
                    </div>`).join('');
                document.getElementById('search-grid').innerHTML += html;
            }
        }
        if(!hasResult) view.innerHTML = `<div style="text-align:center;padding:100px;opacity:0.5;">全网未搜到相关资源，请换个词试试</div>`;
    }

    async function route(id, el) {
        if(el) {
            document.querySelectorAll('.nav div').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
        const view = document.getElementById('main-view');
        if(apiList.length === 0) {
            view.innerHTML = `<div style="text-align:center; padding:100px; opacity:0.5;">
                <h2>欢迎使用 JOE TV</h2>
                <p>当前无可用线路，请点击 [系统配置] 导入接口</p>
                <button class="mgr-btn" style="background:var(--main);color:#fff;width:200px;" onclick="toggleModal(true)">去配置</button>
            </div>`;
            return;
        }

        view.innerHTML = `<div class="section-h">🔥 热门推荐</div><div class="grid" id="main-grid"></div>`;
        // 抓取最快的前3个源的数据展示
        for(let i=0; i<Math.min(3, apiList.length); i++) {
            const d = await smartFetch(apiList[i].url, `ac=detail&t=${id === 'home' ? '' : id}`);
            if(d && d.list) {
                const html = d.list.slice(0, 8).map(v => `
                    <div class="card">
                        <div class="source-tag">${apiList[i].name}</div>
                        <img src="${v.vod_pic}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Pic'">
                        <div class="info">${v.vod_name}</div>
                    </div>`).join('');
                document.getElementById('main-grid').innerHTML += html;
            }
        }
    }

    function toggleModal(s) { 
        document.getElementById('mgr-modal').style.display = s?'flex':'none'; 
        if(s) renderMgr(); 
    }

    window.onload = () => route('home');
</script>
</body>
</html>
