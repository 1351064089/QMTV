<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>JOE TV V22.02 | 稳定修复版</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --main: #6c5ce7; --bg: #f4f7f6; --text: #2d3436; --error: #ff7675; --success: #00b894; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow-x: hidden; }
        header { position: sticky; top: 0; background: #fff; display: flex; align-items: center; padding: 10px 20px; z-index: 1000; border-bottom: 1px solid #ddd; }
        .logo { font-size: 20px; font-weight: bold; color: var(--main); margin-right: 20px; cursor: pointer; }
        .nav { display: flex; gap: 8px; flex: 1; overflow-x: auto; }
        .nav div { padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; background: #eee; white-space: nowrap; }
        .nav .active { background: var(--main); color: #fff; }
        .search-box input { padding: 8px 18px; border-radius: 20px; border: 1px solid #ddd; outline: none; width: 200px; }

        .container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #fff; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .card .info { padding: 8px; font-size: 12px; text-align: center; font-weight: bold; }
        .source-tag { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; padding: 2px 5px; border-radius: 4px; }

        #player-page { position: fixed; inset: 0; background: #fff; z-index: 2000; display: none; overflow-y: auto; }
        .p-layout { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; }
        .v-box { flex: 1; min-width: 60%; background: #000; aspect-ratio: 16/9; }
        .side-panel { width: 350px; flex-shrink: 0; }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; margin-top: 10px; }
        .ep-btn { background: #f0f0f0; padding: 10px 0; text-align: center; font-size: 12px; cursor: pointer; border-radius: 4px; }
        .ep-btn.active { background: var(--main); color: #fff; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-body { background: #fff; width: 90%; max-width: 500px; padding: 20px; border-radius: 12px; }
        textarea { width: 100%; height: 120px; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        .api-list-mgr { max-height: 200px; overflow-y: auto; border: 1px solid #eee; margin-bottom: 10px; }
        .api-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">JOE TV</div>
    <div class="nav" id="main-nav">
        <div class="active" onclick="changeTab('home', this)">首页</div>
        <div onclick="changeTab('1', this)">电影</div>
        <div onclick="changeTab('2', this)">剧集</div>
        <div onclick="changeTab('3', this)">综艺</div>
        <div onclick="changeTab('4', this)">动漫</div>
        <div style="background:#ff7675;color:#fff" onclick="toggleModal(true)">订阅管理</div>
    </div>
    <div class="search-box">
        <input type="text" id="kw" placeholder="回车搜索..." onkeydown="if(event.keyCode==13) startSearch()">
    </div>
</header>

<div class="container" id="main-view"></div>

<div id="player-page">
    <div style="padding:15px; cursor:pointer; font-weight:bold;" onclick="closePlayer()"> 返回列表</div>
    <div class="p-layout">
        <div class="v-box" id="v-wrapper"></div>
        <div class="side-panel">
            <h3 id="v-title">加载中...</h3>
            <div id="api-tabs" style="display:flex; gap:5px; margin-bottom:10px; overflow-x:auto;"></div>
            <div class="ep-grid" id="ep-grid"></div>
        </div>
    </div>
</div>

<div id="mgr-modal" class="modal">
    <div class="modal-body">
        <h3>订阅管理</h3>
        <div class="api-list-mgr" id="api-mgr-list"></div>
        <textarea id="api-input" placeholder="粘贴接口URL，每行一个..."></textarea>
        <button onclick="saveApis()" style="width:100%; padding:10px; background:var(--main); color:#fff; border:none; border-radius:5px;">保存并同步</button>
        <button onclick="toggleModal(false)" style="width:100%; margin-top:5px; padding:10px; background:#ccc; border:none; border-radius:5px;">关闭</button>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    const DB_KEY = 'JOE_DATA_V22';
    let apis = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
    let player = null, currentVod = null, currentApi = '';

    // 初始化检查
    window.onload = () => {
        if(apis.length === 0) {
            document.getElementById('main-view').innerHTML = '<div style="text-align:center;padding:50px">请点击右上角【订阅管理】添加接口</div>';
        } else {
            loadList('');
        }
    };

    function toggleModal(show) {
        document.getElementById('mgr-modal').style.display = show ? 'flex' : 'none';
        if(show) renderApiMgr();
    }

    function renderApiMgr() {
        const list = document.getElementById('api-mgr-list');
        list.innerHTML = apis.map((a, i) => `
            <div class="api-item">
                <span>${a.name || '未知源'} (${a.url.substring(0, 20)}...)</span>
                <span style="color:red;cursor:pointer" onclick="delApi(${i})">删除</span>
            </div>
        `).join('');
    }

    async function saveApis() {
        const input = document.getElementById('api-input').value.trim();
        const urls = input.split('\n').filter(u => u.startsWith('http'));
        
        for(let url of urls) {
            const res = await fetchApi(url.trim() + (url.includes('?') ? '&' : '?') + 'ac=list');
            if(res) {
                apis.push({ name: res.name || '新资源源', url: url.trim() });
            }
        }
        localStorage.setItem(DB_KEY, JSON.stringify(apis));
        alert('导入完成');
        location.reload();
    }

    function delApi(i) {
        apis.splice(i, 1);
        localStorage.setItem(DB_KEY, JSON.stringify(apis));
        renderApiMgr();
    }

    async function fetchApi(url) {
        try {
            const res = await fetch(url);
            const text = await res.text();
            if(text.includes('<rss')) {
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const videos = Array.from(xml.querySelectorAll('video'));
                return {
                    name: xml.querySelector('rss')?.getAttribute('name'),
                    list: videos.map(v => ({
                        vod_id: v.querySelector('id')?.textContent,
                        vod_name: v.querySelector('name')?.textContent,
                        vod_pic: v.querySelector('pic')?.textContent,
                        vod_play_url: v.querySelector('dl dd')?.textContent
                    }))
                };
            }
            const json = JSON.parse(text);
            return { name: json.source?.name, list: json.list || [] };
        } catch(e) { return null; }
    }

    async function loadList(tid) {
        if(!apis.length) return;
        const view = document.getElementById('main-view');
        view.innerHTML = '<p style="text-align:center">正在加载主线路数据...</p>';
        const data = await fetchApi(apis[0].url + (apis[0].url.includes('?') ? '&' : '?') + 'ac=detail&t=' + tid);
        if(data && data.list) {
            renderGrid(data.list, apis[0].url);
        } else {
            view.innerHTML = '<p style="text-align:center;color:red">主线路连接失败，请在管理中调整顺序</p>';
        }
    }

    function renderGrid(list, apiUrl) {
        const view = document.getElementById('main-view');
        view.innerHTML = `<div class="grid">${list.map(v => `
            <div class="card" onclick="showDetail('${apiUrl}','${v.vod_id}')">
                <img src="${v.vod_pic}" onerror="this.src='https://via.placeholder.com/150x200?text=Error'">
                <div class="info">${v.vod_name}</div>
            </div>
        `).join('')}</div>`;
    }

    async function startSearch() {
        const kw = document.getElementById('kw').value.trim();
        if(!kw) return;
        const view = document.getElementById('main-view');
        view.innerHTML = `<h3>正在搜索: ${kw} ...</h3><div class="grid" id="search-grid"></div>`;
        
        for(let api of apis) {
            const data = await fetchApi(api.url + (api.url.includes('?') ? '&' : '?') + 'ac=detail&wd=' + encodeURIComponent(kw));
            if(data && data.list) {
                const grid = document.getElementById('search-grid');
                data.list.forEach(v => {
                    grid.innerHTML += `
                        <div class="card" onclick="showDetail('${api.url}','${v.vod_id}')">
                            <div class="source-tag">${api.name}</div>
                            <img src="${v.vod_pic}">
                            <div class="info">${v.vod_name}</div>
                        </div>`;
                });
            }
        }
    }

    async function showDetail(apiUrl, id) {
        currentApi = apiUrl;
        const data = await fetchApi(apiUrl + (apiUrl.includes('?') ? '&' : '?') + 'ac=detail&ids=' + id);
        if(!data || !data.list.length) return;
        
        currentVod = data.list[0];
        document.getElementById('player-page').style.display = 'block';
        document.getElementById('v-title').innerText = currentVod.vod_name;
        
        // 线路切换页签
        const tabs = document.getElementById('api-tabs');
        tabs.innerHTML = apis.map(a => `<button onclick="switchLine('${a.url}')">${a.name}</button>`).join('');

        // 解析剧集
        const playUrls = currentVod.vod_play_url.split('$$$')[0].split('#');
        const epGrid = document.getElementById('ep-grid');
        epGrid.innerHTML = playUrls.map(p => {
            const [name, url] = p.split('$');
            return `<div class="ep-btn" onclick="playVideo('${url}', this)">${name}</div>`;
        }).join('');
        
        if(playUrls.length) epGrid.firstChild.click();
    }

    async function switchLine(url) {
        const data = await fetchApi(url + (url.includes('?') ? '&' : '?') + 'ac=detail&wd=' + encodeURIComponent(currentVod.vod_name));
        if(data && data.list.length) {
            showDetail(url, data.list[0].vod_id);
        } else {
            alert('该线路无匹配资源');
        }
    }

    function playVideo(url, el) {
        document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        
        if(player) player.dispose();
        document.getElementById('v-wrapper').innerHTML = `<video id="v-core" class="video-js vjs-16-9 vjs-big-play-centered" controls autoplay></video>`;
        
        player = videojs('v-core');
        player.src({ src: url, type: 'application/x-mpegURL' });
    }

    function closePlayer() {
        if(player) player.pause();
        document.getElementById('player-page').style.display = 'none';
    }

    function changeTab(tid, el) {
        document.querySelectorAll('.nav div').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        loadList(tid === 'home' ? '' : tid);
    }
</script>
</body>
</html>
